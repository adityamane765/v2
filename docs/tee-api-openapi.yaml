openapi: 3.1.0

# ─────────────────────────────────────────────────────────────────────────────
# Nyx TEE v2 — API contract
#
# Wire contract for the dedicated-TEE matching layer that replaces the
# MagicBlock-PER-based one in v2. Read this with:
#   * docs/tee-v2-migration.md  — component classification + phases
#   * docs/tee-architecture.md  — in-TEE design (boot, persistence, prover)
#   * docs/tee-attestation-flow.md — who verifies what, when, on failure
#   * CRYPTOGRAPHY.md §§4-9     — cryptographic invariants the on-chain
#                                 handlers verify against signatures
#                                 produced by this API
#
# Conventions:
#   * Base URL: /api/v1 — see `servers:` below for hosts.
#   * Transport: TLS terminated INSIDE the enclave by dstack-ingress.
#     The TLS cert's private key is generated by the TEE and never
#     leaves it. Clients verify this binding by fetching the
#     /evidences/ bundle — see the `attestation` tag below.
#   * NO in-band session-encryption envelope. The prior draft of
#     this spec had X25519+AES-GCM session.setup / rekey ops to defend
#     against a malicious load balancer. dstack-ingress + RA-HTTPS
#     supersedes that: there is no LB in the trust path, the TLS
#     endpoint is inside the encrypted CVM. See tee-attestation-flow.md
#     §4 for the verification chain.
#   * Auth: OAuth2 client_credentials. Long-lived (api_key,
#     api_secret, passphrase) → short-lived bearer token.
#   * Settlement: every successful match results in the TEE
#     submitting `verify_match_batch` + N `tee_forced_settle_batched`
#     + `close_batch_validity_marker` to L1. Settlement is async;
#     clients poll `/settlement/status/{batchId}` or subscribe to the
#     WS settlement channel.
#   * Tree state: the TEE mirrors `VaultConfig.current_root` + the
#     full leaf set in-memory. `/tree/*` endpoints replace the SDK's
#     `MerkleShadow` rebuild.
#   * Transparency: `/transparency` is unauthenticated. Anyone can
#     verify reserves + attestation + aggregate stats.
#
# Versioning: this is the v2 contract (post-Phase-1c-hard + post-TEE-
# migration + post-Phala/dstack-docs-deep-dive on 2026-05-25).
# Breaking changes to request/response shapes bump the base path to
# `/api/v2`.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Nyx TEE v2 API
  version: 2.0.0-draft
  description: |
    Public + authenticated REST and WebSocket API for the Nyx dark pool
    TEE matching layer. Pairs with the v2 on-chain custody program
    (vault, program ID `C63vKvysCzX55PKraas4Wc22ijqjGJQdPC1mrzCFVWZx`).
  contact:
    name: Nyx engineering
    url: https://github.com/Nyx-Privacy/nyx
  license:
    name: Apache-2.0

servers:
  - url: https://api.nyx.example.com/api/v1
    description: Mainnet (TBD — Phala dstack)
  - url: https://api.devnet.nyx.example.com/api/v1
    description: Devnet (TBD — Phala dstack devnet)

# ─────────────────────────────────────────────────────────────────────────────
# Tags — grouped for docs rendering
# ─────────────────────────────────────────────────────────────────────────────

tags:
  - name: auth
    description: OAuth2 client-credentials. No session-key exchange (RA-HTTPS supersedes it).
  - name: attestation
    description: |
      TEE attestation quote retrieval + RA-TLS evidence bundle. Verify
      before any sensitive write. The /evidences/* endpoints under
      this tag are served by dstack-ingress, not by nyx-tee directly,
      but they're documented here for client-side completeness.
  - name: info
    description: |
      Application/instance metadata (compose-hash, app-id, instance-id,
      TCB info). Used in tandem with /attestation to verify the running
      image matches the SDK's expected EXPECTED_COMPOSE_HASH constant.
  - name: instruments
    description: Public market metadata.
  - name: orders
    description: Place / cancel / mass-quote / inspect orders.
  - name: account
    description: Per-account balance, open orders, outstanding notes.
  - name: tree
    description: Merkle-tree state mirror — replaces the SDK's MerkleShadow rebuild.
  - name: transparency
    description: Public proof-of-reserves + engine attestation + aggregate stats.
  - name: settlement
    description: Batch settlement status (TEE → L1 tx_signature lookup).

# ─────────────────────────────────────────────────────────────────────────────
# Security schemes
# ─────────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived (≤ 1h) bearer token from POST /auth/token.

  # ───── Shared schemas ──────────────────────────────────────────────────────

  schemas:

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "token_expired"
        message:
          type: string
          example: "Bearer token has expired — call POST /auth/token to refresh."
        retry_after_ms:
          type: integer
          description: When the client may retry (rate-limit + transient errors).

    AuthTokenRequest:
      type: object
      required: [api_key, api_secret, passphrase]
      properties:
        api_key:
          type: string
          description: Public credential identifier provisioned at account setup.
        api_secret:
          type: string
          format: password
          description: HMAC secret, paired with api_key.
        passphrase:
          type: string
          format: password
          description: Account-level passphrase (third factor; required).

    AuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in, account_id]
      properties:
        access_token:
          type: string
          description: Bearer token. Pass as `Authorization: Bearer <token>`.
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds from issue time.
        account_id:
          type: string
          description: Stable per-account identifier.

    AttestationQuote:
      type: object
      description: |
        Intel TDX attestation quote + event log + VM config.
        Shape matches what the dstack-sdk `getQuote()` returns plus
        a few convenience fields the SDK's verifyTeeAttestation()
        helper needs. Clients run the verification chain documented
        in docs/tee-attestation-flow.md §4.
      required: [quote, event_log, report_data, vm_config, tee_pubkey]
      properties:
        quote:
          type: string
          description: Hex-encoded TDX quote (DCAP format).
        event_log:
          type: string
          description: |
            Hex-encoded JSON event log. Replayed against RTMR3 to
            verify the recorded compose-hash + instance-id +
            key-provider events.
        report_data:
          type: string
          description: |
            64-byte report_data field embedded in the quote, hex.
            Layout when callers pass `?reportData=<nonce>`:
              report_data[0..32] = caller-supplied nonce
              report_data[32..64] = SHA-256(tee_pubkey)  (binding)
        vm_config:
          type: object
          description: |
            VM hardware configuration the quote attests to. Required
            by dstack-verifier for the OS measurement re-computation.
          properties:
            cpu_count: { type: integer }
            memory_mb: { type: integer }
            os_image_hash: { type: string }
        tee_pubkey:
          type: string
          description: |
            Base58 Ed25519 pubkey the TEE signs MatchResultPayload
            canonical hashes with. Equal to on-chain
            `vault_config.tee_pubkey` after the most recent
            set_tee_pubkey multisig rotation.
        issued_at:
          type: string
          format: date-time
        # The MRTD / RTMR0-3 fields are present inside the binary
        # quote and are exposed by dstack-verifier when verification
        # runs. They're not duplicated here as separate response
        # fields — clients parse them out of `quote` via dcap-qvl
        # (or by hitting Phala's /api/v1/attestations/verify endpoint).

    AppInfo:
      type: object
      description: |
        Application + instance metadata, returned by GET /info.
        Mirrors what dstack-sdk `client.info()` returns plus a
        couple of Nyx-specific fields. Used in tandem with
        /attestation by the SDK's verifyTeeAttestation() helper.
      required: [app_id, instance_id, compose_hash, tcb_info, tee_pubkey]
      properties:
        app_id:
          type: string
          description: Hex app-id — deterministic from deployer + compose.
        instance_id:
          type: string
          description: Hex instance-id of this specific CVM.
        compose_hash:
          type: string
          description: |
            SHA-256 of canonicalised app-compose.json. SDK-side
            EXPECTED_COMPOSE_HASH constant must equal this for the
            attestation check to pass.
        tcb_info:
          type: object
          description: TCB version + os-image hash + event_log payload.
        device_id:
          type: string
          description: TDX platform identifier of this host (PPID-derived).
        mr_aggregated:
          type: string
          description: Hex aggregated MR (combined MR* + RTMR* digest).
        os_image_hash:
          type: string
          description: Hex hash of the running dstack OS image.
        tee_pubkey:
          type: string
          description: Base58 Ed25519 pubkey (same as in AttestationQuote).
        nyx_version:
          type: string
          description: Semver tag of the nyx-tee build (e.g. v0.4.2).

    RaTlsEvidence:
      type: object
      description: |
        Files served at /evidences/ by dstack-ingress. Used by clients
        to verify the served TLS certificate is bound to a key held
        inside the TEE. See docs/tee-attestation-flow.md §4.1.
      properties:
        quote_json:
          type: string
          description: Contents of /evidences/quote.json (TDX quote bundle).
        cert_pem:
          type: string
          description: Current TLS cert, PEM-encoded.
        acme_account_json:
          type: string
          description: |
            JSON document with the dstack-ingress-managed
            Let's Encrypt account URI.
        sha256sum_txt:
          type: string
          description: |
            SHA-256 of (cert_pem || acme_account_json). The quote's
            report_data contains sha256(sha256sum_txt) — the binding.

    Instrument:
      type: object
      required: [symbol, base_mint, quote_mint, tick_size, min_order_size]
      properties:
        symbol:
          type: string
          example: "SOL-USDC"
        base_mint:
          type: string
          description: Base SPL mint pubkey (base58).
        quote_mint:
          type: string
          description: Quote SPL mint pubkey (base58).
        tick_size:
          type: string
          description: Decimal string; smallest price increment.
        min_order_size:
          type: string
          description: Decimal string; minimum order amount in base units.
        oracle:
          type: object
          properties:
            type: { type: string, enum: [pyth_pull_v2, nyxmkpth_mock] }
            pubkey: { type: string, description: Oracle account pubkey }
            circuit_breaker_bps:
              type: integer
              description: |
                Max deviation from oracle TWAP that the TEE will
                clear at. Same parameter enforced in-circuit by
                VALID_MATCH_BATCH.

    PlaceOrderRequest:
      type: object
      required:
        - symbol
        - side
        - order_type
        - amount
        - note_commitment
        - user_commitment
        - trading_key_signature
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        order_type:
          type: string
          enum: [limit, ioc, fok]
        amount:
          type: string
          description: Decimal string in base units.
        price_limit:
          type: string
          description: Decimal string; required for limit/ioc/fok orders.
        min_fill_size:
          type: string
          description: Optional. Reject fills smaller than this.
        expiry_slot:
          type: integer
          description: |
            Solana slot past which this order auto-expires. Bounded
            by the per-market max expiry to prevent permanent
            collateral lock.
        note_commitment:
          type: string
          description: |
            32-byte hex — Poseidon6 commitment to the collateral
            note this order is backed by. Note must exist on-chain
            (in the Merkle tree) AND be in a lockable state (no
            existing NoteLock PDA).
        user_commitment:
          type: string
          description: |
            32-byte hex — `Poseidon2(spending_key, r_owner)`. Used
            on-chain by VALID_MATCH_BATCH to bind output notes to
            the correct owner.
        trading_key_signature:
          type: string
          description: |
            Ed25519 sig (base64) over the canonical request body,
            from the trading key. Lets the TEE attribute the order
            to a specific user without requiring a per-order
            on-chain tx.

    Order:
      type: object
      required: [order_id, symbol, side, order_type, amount, status, created_at]
      properties:
        order_id:
          type: string
          description: TEE-assigned order ID.
        symbol: { type: string }
        side: { type: string, enum: [buy, sell] }
        order_type: { type: string, enum: [limit, ioc, fok] }
        amount: { type: string }
        price_limit: { type: string }
        min_fill_size: { type: string }
        expiry_slot: { type: integer }
        status:
          type: string
          enum: [pending, partial, filled, expired, cancelled]
        filled_amount: { type: string }
        average_fill_price: { type: string }
        created_at: { type: string, format: date-time }
        last_fill_at: { type: string, format: date-time, nullable: true }
        batch_id:
          type: string
          description: |
            ID of the batch this order matched in (if any). Use with
            GET /settlement/status/{batch_id} to find the on-chain
            settle tx.
          nullable: true

    MassQuoteRequest:
      type: object
      required: [pairs]
      properties:
        pairs:
          type: array
          minItems: 1
          maxItems: 20
          description: |
            Atomic cancel-replace pairs. The TEE processes them as
            one batch — either all succeed or all fail. Designed
            for market-maker quote updates.
          items:
            type: object
            required: [cancel_order_id, place]
            properties:
              cancel_order_id:
                type: string
                description: |
                  Order to cancel. Use null to indicate a pure
                  "place new" with no replacement leg.
                nullable: true
              place:
                $ref: '#/components/schemas/PlaceOrderRequest'

    MassQuoteResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [cancel_status, place_order]
            properties:
              cancel_status:
                type: string
                enum: [cancelled, not_found, no_cancel_requested]
              place_order:
                $ref: '#/components/schemas/Order'

    Account:
      type: object
      required: [account_id, balances, open_orders, outstanding_notes]
      properties:
        account_id: { type: string }
        balances:
          type: array
          items:
            type: object
            required: [mint, available, locked]
            properties:
              mint:
                type: string
                description: SPL mint pubkey (base58).
              available:
                type: string
                description: |
                  Total value of notes the user owns that are NOT
                  locked by any order. Computed by the TEE from
                  the on-chain Merkle tree + nullifier set + the
                  user's spending key (which the TEE never sees —
                  the user submits owner-commitment proofs).
              locked:
                type: string
                description: |
                  Total value of notes currently held by open
                  orders / pending settles.
        open_orders:
          type: array
          items: { $ref: '#/components/schemas/Order' }
        outstanding_notes:
          type: array
          description: |
            Note commitments owned by the user that are spendable
            (have an inclusion path in the current Merkle root +
            no nullifier on-chain).
          items:
            type: object
            required: [note_commitment, leaf_index, amount, mint]
            properties:
              note_commitment: { type: string }
              leaf_index: { type: integer }
              amount: { type: string }
              mint: { type: string }

    TreeRoot:
      type: object
      required: [merkle_root, leaf_count, on_chain_slot]
      properties:
        merkle_root:
          type: string
          description: |
            Current Merkle root, hex-encoded. Must equal on-chain
            `VaultConfig.current_root` (or be present in the
            32-root ring buffer).
        leaf_count:
          type: integer
        on_chain_slot:
          type: integer
          description: |
            Solana slot at which the TEE last synced its mirror
            from on-chain `VaultConfig`.

    InclusionProof:
      type: object
      required: [note_commitment, leaf_index, merkle_root, siblings]
      properties:
        note_commitment: { type: string }
        leaf_index: { type: integer }
        merkle_root: { type: string }
        siblings:
          type: array
          minItems: 20
          maxItems: 20
          items:
            type: string
            description: 32-byte hex.

    TransparencySnapshot:
      type: object
      required: [reserves, tee, stats]
      description: |
        Public, unauthenticated. Anyone can verify
        (a) vault token balances cover liabilities + (b) the TEE
        attestation is current + (c) aggregate operations are
        healthy.
      properties:
        reserves:
          type: object
          required: [merkle_root, leaf_count, per_mint]
          properties:
            merkle_root: { type: string }
            leaf_count: { type: integer }
            per_mint:
              type: array
              items:
                type: object
                required: [mint, outstanding, vault_balance]
                properties:
                  mint: { type: string }
                  outstanding:
                    type: string
                    description: |
                      Sum of un-spent note amounts for this mint
                      (== `OutstandingMint.outstanding`).
                  vault_balance:
                    type: string
                    description: |
                      Actual SPL balance in the vault's PDA for
                      this mint. MUST be >= outstanding (the v2
                      solvency invariant). If not, something is
                      wrong on-chain.
        tee:
          $ref: '#/components/schemas/AttestationQuote'
        stats:
          type: object
          properties:
            avg_settlement_finality_ms: { type: integer }
            current_batch_id: { type: string }
            last_settled_batch_id: { type: string }
            settles_24h: { type: integer }
            failed_settles_24h: { type: integer }

    SettlementStatus:
      type: object
      required: [batch_id, status, merkle_root]
      properties:
        batch_id: { type: string }
        status:
          type: string
          enum:
            - pending_proof
            - pending_verify_match_batch
            - pending_settles
            - pending_close
            - settled
            - failed
        merkle_root: { type: string }
        verify_match_batch_signature:
          type: string
          nullable: true
          description: L1 tx signature for the batch's verify tx.
        settle_signatures:
          type: array
          description: |
            Per-match settle tx signatures, in match-index order.
          items: { type: string }
        close_signature:
          type: string
          nullable: true
        settled_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
          description: |
            Present iff status == failed. Human-readable failure
            reason + correlation id for ops debugging.

# ─────────────────────────────────────────────────────────────────────────────
# REST endpoints
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ───── auth ────────────────────────────────────────────────────────────────

  /auth/token:
    post:
      tags: [auth]
      summary: Exchange long-lived credentials for a short-lived bearer token.
      description: |
        OAuth2 client_credentials grant. Issue rate is rate-limited
        per api_key.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthTokenRequest' }
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenResponse' }
        '401':
          description: Bad credentials.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limited.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/token/revoke:
    post:
      tags: [auth]
      summary: Revoke an issued bearer token.
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Revoked. }
        '401':
          description: Token already invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── attestation ─────────────────────────────────────────────────────────

  /attestation:
    get:
      tags: [attestation]
      summary: Fresh TEE attestation quote (challenge-response).
      description: |
        Unauthenticated. Clients MUST verify this quote before
        sending order intent. Full verification chain documented
        in docs/tee-attestation-flow.md §4.

        The caller supplies a fresh nonce via reportData; the TEE
        generates a quote with reportData populated as:
            report_data[0..32]  = caller's nonce
            report_data[32..64] = SHA-256(tee_pubkey)

        Verification steps (handled by the SDK's
        verifyTeeAttestation() helper):
          1. Verify Intel TCB cert chain (locally via dcap-qvl or
             via Phala's POST /api/v1/attestations/verify).
          2. Replay RTMR3 event log → confirm rt_mr3 in quote.
          3. Confirm compose-hash event in RTMR3 == the SDK's
             baked-in EXPECTED_COMPOSE_HASH constant.
          4. Confirm key-provider event == known-trusted KMS ID.
          5. Confirm reportData starts with the supplied nonce
             (replay protection) AND ends with SHA-256(tee_pubkey).
          6. Optionally: check CAA records + CT logs (paranoid).
      parameters:
        - name: reportData
          in: query
          required: false
          schema: { type: string }
          description: |
            32-byte nonce in hex. If omitted, the TEE generates a
            quote with all-zero reportData[0..32]. Always supply a
            fresh nonce for live verification (replay protection).
      responses:
        '200':
          description: Current quote.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttestationQuote' }

  /info:
    get:
      tags: [info]
      summary: Application + instance metadata.
      description: |
        Returns the running image's compose-hash, app-id, instance-id,
        device-id, OS image hash, and the Ed25519 signer pubkey. Used
        by the SDK to compare compose-hash against the baked-in
        EXPECTED_COMPOSE_HASH constant and by ops dashboards to track
        which CVM is serving which traffic.
      responses:
        '200':
          description: Application info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInfo' }

  /evidences/quote.json:
    get:
      tags: [attestation]
      summary: (Served by dstack-ingress, not nyx-tee) TDX quote bundle.
      description: |
        Static evidence file. Part of the RA-TLS verification chain;
        see docs/tee-attestation-flow.md §4.1. SHA-256 of this file
        appears in the quote's reportData, proving the TEE generated
        both the quote and the cert at the same time.
      responses:
        '200':
          description: Quote JSON bundle (raw).
          content:
            application/json: {}

  /evidences/cert.pem:
    get:
      tags: [attestation]
      summary: (Served by dstack-ingress) Current TLS certificate.
      responses:
        '200':
          description: PEM-encoded cert.
          content:
            application/x-pem-file: {}

  /evidences/acme-account.json:
    get:
      tags: [attestation]
      summary: (Served by dstack-ingress) Let's Encrypt account URI.
      description: |
        Used together with CAA DNS records to prove that ONLY this
        TEE's ACME account can issue certs for this domain.
      responses:
        '200':
          description: ACME account JSON.
          content:
            application/json: {}

  /evidences/sha256sum.txt:
    get:
      tags: [attestation]
      summary: (Served by dstack-ingress) Hash of cert.pem + acme-account.json.
      description: |
        Allows clients to verify the evidence bundle wasn't tampered
        with. The quote's reportData contains sha256(this file).
      responses:
        '200':
          description: Plain-text hash.
          content:
            text/plain: {}

  # ───── instruments ─────────────────────────────────────────────────────────

  /instruments:
    get:
      tags: [instruments]
      summary: List all tradable instruments.
      responses:
        '200':
          description: All markets.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Instrument' }

  /instruments/{symbol}:
    get:
      tags: [instruments]
      summary: Single instrument detail.
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Instrument detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Instrument' }
        '404':
          description: Unknown symbol.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── orders ──────────────────────────────────────────────────────────────

  /orders:
    post:
      tags: [orders]
      summary: Place a new order.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaceOrderRequest' }
      responses:
        '201':
          description: Order accepted into the matching queue.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400':
          description: Validation error (bad signature, mint mismatch, etc.).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            Conflict — the referenced note_commitment is already
            locked by another order or has been spent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{order_id}:
    get:
      tags: [orders]
      summary: Order status + fill history.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Order detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Unknown order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [orders]
      summary: Cancel an open order.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cancellation processed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Order doesn't exist or is already terminal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/mass-quote:
    post:
      tags: [orders]
      summary: |
        Atomic cancel-replace batch (market-maker primitive).
      description: |
        Up to 20 cancel-replace pairs in one round-trip. Either
        the whole batch succeeds or the whole batch fails (no
        partial-state outcomes). This is the recommended API for
        market makers managing many concurrent quotes.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MassQuoteRequest' }
      responses:
        '200':
          description: Batch processed atomically.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MassQuoteResponse' }
        '400':
          description: Validation error (one or more legs invalid).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── account ─────────────────────────────────────────────────────────────

  /account:
    get:
      tags: [account]
      summary: Account snapshot (balances + open orders + spendable notes).
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Account snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }

  # ───── tree ────────────────────────────────────────────────────────────────

  /tree/root:
    get:
      tags: [tree]
      summary: |
        Current Merkle root + leaf count.
      description: |
        Convenience read served by the TEE's in-memory Merkle mirror.
        Eventually-consistent with on-chain VaultConfig.current_root
        (lags by ~1-2 slots after each settle confirms).

        Trustless fallback: clients who don't trust the TEE for read
        queries can fetch VaultConfig directly from Solana RPC and
        recompute / verify on their own. /tree/root is a fast happy
        path, not a trust layer. See docs/tee-architecture.md §5.5
        and docs/tee-attestation-flow.md §10.
      responses:
        '200':
          description: Tree root snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreeRoot' }

  /tree/inclusion:
    get:
      tags: [tree]
      summary: |
        Inclusion proof for a specific note commitment.
      description: |
        Replacement for `MerkleShadow.witness()`. Clients build
        VALID_SPEND / VALID_INPUT proofs against the returned
        siblings.

        The TEE-served inclusion proof is verifiable: re-hash the
        leaf + siblings up to the returned merkle_root, compare
        against on-chain VaultConfig.current_root, accept the proof
        only if both match. The TEE cannot lie about an inclusion
        proof without the client detecting it on Solana — so this is
        a fast convenience read, not a trust assertion.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: commitment
          in: query
          required: true
          schema: { type: string }
          description: 32-byte hex note commitment.
      responses:
        '200':
          description: Inclusion proof.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InclusionProof' }
        '404':
          description: Commitment not in the tree.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /tree/leaves:
    get:
      tags: [tree]
      summary: |
        Page through leaves. Used by clients catching up cold or
        re-syncing after a long disconnect.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: integer }
        - name: to
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Leaves in [from, to).
          content:
            application/json:
              schema:
                type: object
                required: [leaves, merkle_root]
                properties:
                  leaves:
                    type: array
                    items:
                      type: object
                      required: [leaf_index, value]
                      properties:
                        leaf_index: { type: integer }
                        value: { type: string }
                  merkle_root: { type: string }

  # ───── transparency ────────────────────────────────────────────────────────

  /transparency:
    get:
      tags: [transparency]
      summary: |
        Public proof-of-reserves + engine attestation + aggregate
        stats. Unauthenticated. Anyone can verify.
      parameters:
        - name: epoch
          in: query
          schema: { type: integer }
          description: |
            Optional. Returns the snapshot for a specific TEE
            epoch (rotation generation). Default is current.
      responses:
        '200':
          description: Transparency snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransparencySnapshot' }

  # ───── settlement ──────────────────────────────────────────────────────────

  /settlement/status/{batch_id}:
    get:
      tags: [settlement]
      summary: |
        Batch settlement status. Translates a TEE-internal batch
        ID to the on-chain tx signatures of the
        verify_match_batch + tee_forced_settle_batched +
        close_batch_validity_marker chain.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: batch_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Settlement status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettlementStatus' }
        '404':
          description: Unknown batch ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

# ─────────────────────────────────────────────────────────────────────────────
# WebSocket (described inline because OpenAPI 3.1 has no first-class
# WS surface — AsyncAPI would be cleaner; here we document the wire
# protocol as a series of message schemas)
# ─────────────────────────────────────────────────────────────────────────────

x-websocket:

  url: /v1/stream
  description: |
    One multiplexed socket per session. Authenticate with
    `op: login` (carrying a bearer token from POST /auth/token),
    then subscribe to channels.

    There is no in-band session-encryption envelope. The previous
    draft of this spec had X25519 ECDH + AES-256-GCM ops
    (session.setup / rekey) as defense against a malicious load
    balancer. dstack-ingress + RA-HTTPS supersedes that:
    TLS terminates INSIDE the enclave (cert private key generated
    by the TEE; never leaves it), so there is no LB in the trust
    path. Verification done client-side via /evidences/ and
    /attestation — see docs/tee-attestation-flow.md §4.

    Heartbeat: client sends `op: ping` every ≤30s; server
    responds with `op: pong`. Server drops sessions silent for >60s.

  client_ops:

    login:
      description: |
        Authenticate the socket using a bearer token. Required
        before any other op (except ping). Server emits
        `auth_expired` ~60s before token expiry as a reminder.
      message:
        type: object
        required: [op, token]
        properties:
          op: { type: string, enum: [login] }
          token: { type: string, description: Bearer token from POST /auth/token. }
          cancel_on_disconnect:
            type: boolean
            description: |
              If true, the TEE auto-cancels all open orders for
              this account when this socket disconnects.
              Recommended for market makers.

    logout:
      description: End the session cleanly. Server closes the socket.
      message:
        type: object
        required: [op]
        properties:
          op: { type: string, enum: [logout] }

    ping:
      description: Heartbeat (client → server).
      message:
        type: object
        required: [op]
        properties:
          op: { type: string, enum: [ping] }

    # session.setup and rekey ops were removed in the 2026-05-25
    # revision after we adopted dstack-ingress + RA-HTTPS. Session
    # encryption is now exclusively TLS-into-the-enclave; no
    # additional X25519 envelope is needed. Clients that want the
    # belt-and-braces guarantee should verify the /evidences/
    # bundle once at connect, then trust the TLS channel for the
    # session lifetime.

    subscribe:
      description: Subscribe to one or more channels.
      message:
        type: object
        required: [op, channels]
        properties:
          op: { type: string, enum: [subscribe] }
          channels:
            type: array
            items:
              type: string
              enum: [orders, fills, account, settlement, tree]

    unsubscribe:
      description: Unsubscribe from channels.
      message:
        type: object
        required: [op, channels]
        properties:
          op: { type: string, enum: [unsubscribe] }
          channels:
            type: array
            items: { type: string }

    order.place:
      description: |
        Place an order over WS (same shape as POST /orders, just
        encapsulated in the multiplexed socket). Server responds
        with the resulting Order; subsequent state changes arrive
        on the `orders` channel.
      message:
        type: object
        required: [op, request_id, params]
        properties:
          op: { type: string, enum: [order.place] }
          request_id: { type: string, description: Echoed in the response. }
          params: { $ref: '#/components/schemas/PlaceOrderRequest' }

    order.cancel:
      description: Cancel an open order.
      message:
        type: object
        required: [op, request_id, order_id]
        properties:
          op: { type: string, enum: [order.cancel] }
          request_id: { type: string }
          order_id: { type: string }

    order.mass_quote:
      description: Atomic cancel-replace batch (same as POST /orders/mass-quote).
      message:
        type: object
        required: [op, request_id, params]
        properties:
          op: { type: string, enum: [order.mass_quote] }
          request_id: { type: string }
          params: { $ref: '#/components/schemas/MassQuoteRequest' }

    account.info:
      description: |
        Pull-style request for account snapshot over WS (mirrors
        GET /account). For live updates, subscribe to the
        `account` channel.
      message:
        type: object
        required: [op, request_id]
        properties:
          op: { type: string, enum: [account.info] }
          request_id: { type: string }

    tree.inclusion:
      description: |
        Pull-style inclusion proof over WS (lower latency than
        REST round-trip when building VALID_SPEND proofs in a
        tight loop).
      message:
        type: object
        required: [op, request_id, commitment]
        properties:
          op: { type: string, enum: [tree.inclusion] }
          request_id: { type: string }
          commitment: { type: string }

  server_channels:

    orders:
      description: |
        User's own order state. Server sends snapshot on
        subscribe, then incremental updates (`event: placed` /
        `partial` / `filled` / `cancelled` / `expired`).

    fills:
      description: Per-fill events as matches happen.

    account:
      description: Balance + spendable-notes updates after settle.

    settlement:
      description: |
        Batch finalization events. Each event has the batch_id
        + the on-chain tx signatures, mirroring
        GET /settlement/status/{batch_id}.

    tree:
      description: |
        Leaf-append events (for clients that want to keep an
        incremental view of the tree, e.g. dapps showing live
        portfolio state).

# ─────────────────────────────────────────────────────────────────────────────
# Notes for implementers
# ─────────────────────────────────────────────────────────────────────────────

x-implementation-notes:

  auth_lifecycle: |
    `api_key` / `api_secret` / `passphrase` are provisioned at
    account creation and stored client-side (encrypted at rest).
    Tokens issued by POST /auth/token are short-lived (≤ 1h) and
    cached in-process. The WS auto-renewal pattern: server emits
    `auth_expired` ~60s before token expiry; client sends a
    fresh `op: login` with a new token on the same socket
    without dropping subscriptions.

  session_encryption: |
    NONE in band. TLS terminates inside the dstack-ingress
    container running inside our CVM, with a cert whose private
    key was generated by dstack-kms-issued seed and never exposed
    outside the enclave. Clients verify this by fetching the
    /evidences/ bundle once at connect and following the chain
    documented in docs/tee-attestation-flow.md §4.

    The earlier draft of this spec had an X25519 ECDH +
    AES-256-GCM session envelope inside TLS, intended to defend
    against a malicious load balancer. dstack-ingress + RA-HTTPS
    makes that envelope unnecessary — there is no LB in the trust
    path. The session.setup / rekey WS ops were deleted in the
    2026-05-25 revision.

    Edge case: if a future deployment ever moves from
    dstack-ingress (custom domain, TLS-in-enclave) to a gateway
    domain with TLS termination at dstack-gateway, the X25519
    envelope would need to come back. Re-introduce session.setup
    / rekey ops at that point. Until then, omitted.

  validation_at_the_tee: |
    Every authenticated write goes through:
      1. Bearer-token validation.
      2. AEAD envelope decryption (if session.setup was done).
      3. Trading-key signature verification on the inner payload.
      4. Business-rule validation (note exists, not locked,
         mint matches, expiry sensible, amount > 0, etc.).
    Only after all four does the order land in the in-memory
    book.

  settlement_correlation: |
    Each TEE batch is identified by a stable `batch_id`. Orders
    that match in that batch reference it via `Order.batch_id`.
    Clients can correlate "this fill" → "this batch" → "this
    on-chain tx_signature" via /settlement/status. The
    `channel: settlement` WS event fires once per batch as the
    on-chain settle chain (verify → settles → close) finalizes.

  tree_consistency: |
    `/tree/root` returns the TEE's current view, which is
    eventually consistent with on-chain `VaultConfig.current_root`
    (lags by ~1-2 slots after each settle confirms). For
    correctness-critical reads (e.g. just before building a
    VALID_SPEND proof), clients should call /tree/root, take the
    root value, build the proof against THAT specific root, and
    submit `withdraw` referencing the same root. The on-chain
    handler accepts any root within the 32-slot ring buffer.

  rate_limits: |
    Per-account weighted action cost model — order placement
    counts more than `GET /account`. Specific limits TBD; safe
    defaults to start: 60 orders/min, 600 reads/min, 5
    mass-quote-batches/min. Limits are enforced at the gateway
    AND at the TEE (defence in depth).

  errors: |
    All errors return { code, message, retry_after_ms? } in the
    Error schema. Codes are stable strings (not numbers) for easy
    client handling.

    Server-side codes (HTTP/WS responses):
      `token_expired`               — bearer token expired
      `bad_credentials`             — POST /auth/token failed
      `note_already_locked`         — note has an active NoteLock
      `commitment_not_in_tree`      — note not in current Merkle root
      `mint_mismatch`               — order mint doesn't match note
      `min_fill_violation`          — fill below order's min_fill_size
      `circuit_breaker_hit`         — clearing price exceeded oracle band
      `rate_limited`                — per-account rate limit exceeded

    Client-side (SDK-thrown, never sent over the wire):
      `TEE_ATTESTATION_FAILED`      — generic; see specific code below
      `TEE_QUOTE_SIG_INVALID`       — Intel TCB cert chain failed
      `TEE_COMPOSE_HASH_MISMATCH`   — rt_mr3 compose-hash != expected
      `TEE_REPORT_DATA_MISMATCH`    — quote not bound to served cert
      `TEE_EVIDENCE_TAMPERED`       — sha256sum mismatch in /evidences/
      `TEE_KEY_PROVIDER_UNKNOWN`    — key-provider event != trusted KMS
