openapi: 3.1.0

# ─────────────────────────────────────────────────────────────────────────────
# Nyx TEE — API contract
#
# Wire contract for the in-CVM matching/settlement layer. Read this with:
#   * docs/tee-architecture.md  — in-TEE design (boot, persistence, prover)
#   * docs/tee-attestation-flow.md — who verifies what, when, on failure
#   * CRYPTOGRAPHY.md §§4-9     — cryptographic invariants the on-chain
#                                 handlers verify against signatures
#                                 produced by this API
#
# Conventions:
#   * Base URL: /api/v1 — see `servers:` below for hosts.
#   * Transport: TLS terminated INSIDE the enclave by dstack-ingress.
#     The TLS cert's private key is generated by the TEE and never
#     leaves it. Clients verify this binding by fetching the
#     /evidences/ bundle — see the `attestation` tag below.
#   * NO in-band session-encryption envelope. The prior draft of
#     this spec had X25519+AES-GCM session.setup / rekey ops to defend
#     against a malicious load balancer. dstack-ingress + RA-HTTPS
#     supersedes that: there is no LB in the trust path, the TLS
#     endpoint is inside the encrypted CVM. See tee-attestation-flow.md
#     §4 for the verification chain.
#   * Auth: OAuth2 client_credentials. Long-lived (api_key,
#     api_secret, passphrase) → short-lived bearer token.
#   * Settlement: every successful match results in the TEE
#     submitting `verify_match_batch` + N `tee_forced_settle_batched`
#     + `close_batch_validity_marker` to L1. Settlement is async;
#     clients poll `/settlement/status/{batchId}` or subscribe to the
#     WS settlement channel.
#   * Tree state: the TEE mirrors each `MerkleTree[tree_id].current_root`
#     + the full per-shard leaf set in-memory (K mirrors under
#     tree-sharding). `/tree/*` endpoints replace the SDK's
#     `MerkleShadow` rebuild and take an optional `?tree_id` (default 0).
#   * Transparency: `/transparency` is unauthenticated. Anyone can
#     verify reserves + attestation + aggregate stats.
#
# Versioning: this is the v2 contract (post-Phase-1c-hard + post-TEE-
# migration + post-Phala/dstack-docs-deep-dive on 2026-05-25).
# Breaking changes to request/response shapes bump the base path to
# `/api/v2`.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Nyx TEE API
  version: 2.0.0-draft
  description: |
    Public + authenticated REST and WebSocket API for the Nyx dark pool
    TEE matching layer. Pairs with the v2 on-chain custody program
    (vault, program ID `C63vKvysCzX55PKraas4Wc22ijqjGJQdPC1mrzCFVWZx`).
  contact:
    name: Nyx engineering
    url: https://github.com/Nyx-Privacy/nyx
  license:
    name: Apache-2.0

servers:
  - url: https://api.nyx.example.com/api/v1
    description: Mainnet (TBD — Phala dstack)
  - url: https://api.devnet.nyx.example.com/api/v1
    description: Devnet (TBD — Phala dstack devnet)

# ─────────────────────────────────────────────────────────────────────────────
# Tags — grouped for docs rendering
# ─────────────────────────────────────────────────────────────────────────────

tags:
  - name: auth
    description: OAuth2 client-credentials. No session-key exchange (RA-HTTPS supersedes it).
  - name: admin
    description: Admin-gated account provisioning (register new API accounts).
  - name: attestation
    description: |
      TEE attestation quote retrieval + RA-TLS evidence bundle. Verify
      before any sensitive write. The /evidences/* endpoints under
      this tag are served by dstack-ingress, not by nyx-tee directly,
      but they're documented here for client-side completeness.
  - name: info
    description: |
      Application/instance metadata (compose-hash, app-id, instance-id,
      TCB info). Used in tandem with /attestation to verify the running
      image matches the SDK's expected EXPECTED_COMPOSE_HASH constant.
  - name: instruments
    description: Public market metadata.
  - name: orders
    description: Place / cancel / modify / inspect orders.
  - name: system
    description: Public engine liveness + server time (GTT slot conversion).
  - name: account
    description: Per-account balance, open orders, outstanding notes.
  - name: tree
    description: Merkle-tree state mirror — replaces the SDK's MerkleShadow rebuild.
  - name: transparency
    description: Public proof-of-reserves + engine attestation + aggregate stats.
  - name: settlement
    description: Batch settlement status (TEE → L1 tx_signature lookup).

# ─────────────────────────────────────────────────────────────────────────────
# Security schemes
# ─────────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived (≤ 1h) bearer token from POST /auth/token.

  # ───── Shared schemas ──────────────────────────────────────────────────────

  schemas:

    Error:
      type: object
      description: |
        The error envelope. Every non-2xx response renders as this shape, with
        the mapped HTTP status. Success responses are NOT enveloped (their typed
        body is returned directly). Every response — success and error — carries
        an `x-request-id` header for correlation with server logs.
      required: [code, message]
      properties:
        code:
          type: integer
          description: |
            Stable numeric error code. Ranges: 1000–1099 request validation,
            1100–1199 auth, 1200–1299 conflict, 1300–1399 not found, 1400–1499
            rate limit, 5000+ server. See the Error Codes reference.
          example: 1102
        message:
          type: string
          example: "trading_key_signature does not verify against the canonical body"

    AuthTokenRequest:
      type: object
      required: [api_key, api_secret, passphrase]
      properties:
        api_key:
          type: string
          description: Public credential identifier provisioned at account setup.
        api_secret:
          type: string
          format: password
          description: HMAC secret, paired with api_key.
        passphrase:
          type: string
          format: password
          description: Account-level passphrase (third factor; required).

    AuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in, account_id]
      properties:
        access_token:
          type: string
          description: "Bearer token. Pass as `Authorization: Bearer <token>`."
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds from issue time.
        account_id:
          type: string
          description: Stable per-account identifier.

    RegisterAccountRequest:
      type: object
      required: [api_key, api_secret, passphrase]
      properties:
        api_key:
          type: string
          description: Public credential identifier for the new account. Must be unique.
        api_secret:
          type: string
          format: password
          description: Secret for the new account. Argon2id-hashed before storage; never persisted in plaintext.
        passphrase:
          type: string
          format: password
          description: Account-level passphrase for the new account. Argon2id-hashed before storage.
        is_admin:
          type: boolean
          default: false
          description: Whether the new account may itself register further accounts.

    RegisterAccountResponse:
      type: object
      required: [api_key, is_admin]
      properties:
        api_key:
          type: string
          description: The registered api_key (echoed back for confirmation).
        is_admin:
          type: boolean
          description: The role the account was created with. Secret/passphrase are never echoed.

    AttestationQuote:
      type: object
      description: |
        Intel TDX attestation quote + event log + VM config.
        Shape matches what the dstack-sdk `getQuote()` returns plus
        a few convenience fields the SDK's verifyTeeAttestation()
        helper needs. Clients run the verification chain documented
        in docs/tee-attestation-flow.md §4.
      required: [quote, event_log, report_data, vm_config, tee_pubkey]
      properties:
        quote:
          type: string
          description: Hex-encoded TDX quote (DCAP format).
        event_log:
          type: string
          description: |
            Hex-encoded JSON event log. Replayed against RTMR3 to
            verify the recorded compose-hash + instance-id +
            key-provider events.
        report_data:
          type: string
          description: |
            64-byte report_data field embedded in the quote, hex.
            Layout when callers pass `?reportData=<nonce>`:
              report_data[0..32] = caller-supplied nonce
              report_data[32..64] = SHA-256(tee_pubkey)  (binding)
        vm_config:
          type: object
          description: |
            VM hardware configuration the quote attests to. Required
            by dstack-verifier for the OS measurement re-computation.
          properties:
            cpu_count: { type: integer }
            memory_mb: { type: integer }
            os_image_hash: { type: string }
        tee_pubkey:
          type: string
          description: |
            Base58 Ed25519 pubkey the TEE signs MatchResultPayload
            canonical hashes with. Equal to on-chain
            `vault_config.tee_pubkey` after the most recent
            set_tee_pubkey multisig rotation.
        issued_at:
          type: string
          format: date-time
        # The MRTD / RTMR0-3 fields are present inside the binary
        # quote and are exposed by dstack-verifier when verification
        # runs. They're not duplicated here as separate response
        # fields — clients parse them out of `quote` via dcap-qvl
        # (or by hitting Phala's /api/v1/attestations/verify endpoint).

    AppInfo:
      type: object
      description: |
        Application + instance metadata, returned by GET /info.
        Mirrors what dstack-sdk `client.info()` returns plus a
        couple of Nyx-specific fields. Used in tandem with
        /attestation by the SDK's verifyTeeAttestation() helper.
      required: [app_id, instance_id, compose_hash, tcb_info, tee_pubkey]
      properties:
        app_id:
          type: string
          description: Hex app-id — deterministic from deployer + compose.
        instance_id:
          type: string
          description: Hex instance-id of this specific CVM.
        compose_hash:
          type: string
          description: |
            SHA-256 of canonicalised app-compose.json. SDK-side
            EXPECTED_COMPOSE_HASH constant must equal this for the
            attestation check to pass.
        tcb_info:
          type: object
          description: TCB version + os-image hash + event_log payload.
        device_id:
          type: string
          description: TDX platform identifier of this host (PPID-derived).
        mr_aggregated:
          type: string
          description: Hex aggregated MR (combined MR* + RTMR* digest).
        os_image_hash:
          type: string
          description: Hex hash of the running dstack OS image.
        tee_pubkey:
          type: string
          description: |
            Base58 Ed25519 pubkey (same as in AttestationQuote). This is
            the PRIMARY (shard-0) signer. Under tree-sharding the TEE
            derives K = num_trees signer keys (paths
            nyx/ed25519-signer/v1/{0..K-1}); all K are registered in the
            on-chain `vault_config.tee_pubkeys` set via one
            `set_tee_pubkey` rotation, and each is a shard settle
            fee-payer. The attestation report-data binds this primary key.
        nyx_version:
          type: string
          description: Semver tag of the nyx-tee build (e.g. v0.4.2).

    RaTlsEvidence:
      type: object
      description: |
        Files served at /evidences/ by dstack-ingress. Used by clients
        to verify the served TLS certificate is bound to a key held
        inside the TEE. See docs/tee-attestation-flow.md §4.1.
      properties:
        quote_json:
          type: string
          description: Contents of /evidences/quote.json (TDX quote bundle).
        cert_pem:
          type: string
          description: Current TLS cert, PEM-encoded.
        acme_account_json:
          type: string
          description: |
            JSON document with the dstack-ingress-managed
            Let's Encrypt account URI.
        sha256sum_txt:
          type: string
          description: |
            SHA-256 of (cert_pem || acme_account_json). The quote's
            report_data contains sha256(sha256sum_txt) — the binding.

    Instrument:
      type: object
      required: [symbol, base_mint, quote_mint, tick_size, min_order_size]
      properties:
        symbol:
          type: string
          example: "SOL-USDC"
        base_mint:
          type: string
          description: Base SPL mint pubkey (base58).
        quote_mint:
          type: string
          description: Quote SPL mint pubkey (base58).
        tick_size:
          type: string
          description: Decimal string; smallest price increment.
        min_order_size:
          type: string
          description: Decimal string; minimum order amount in base units.
        oracle:
          type: object
          properties:
            type: { type: string, enum: [pyth_pull_v2, nyxmkpth_mock] }
            pubkey: { type: string, description: Oracle account pubkey }
            circuit_breaker_bps:
              type: integer
              description: |
                Max deviation from oracle TWAP that the TEE will
                clear at. Same parameter enforced in-circuit by
                VALID_MATCH_BATCH.

    PlaceOrderRequest:
      type: object
      description: |
        The v2 (`inner_hash`) order body. All 32/64/16-byte fields are
        hex-encoded strings; all numeric fields are JSON integers (u64).
        The trading-key signature covers the canonical encoding of the
        economic fields + the anchor-pool hash + `arrival_nonce`; the
        opening fields (`owner_commitment`, `note_inner_hash`) are pinned
        to the signature indirectly — the matcher re-derives
        `note_commitment` from them and rejects a mismatch.
      required:
        - symbol
        - side
        - order_type
        - amount
        - price_limit
        - expiry_slot
        - order_id
        - note_commitment
        - user_commitment
        - arrival_nonce
        - trading_key
        - trading_key_signature
        - owner_commitment
        - note_inner_hash
        - nullifier
        - merkle_root
        - valid_input_proof
        - anchors
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [bid, ask]
          description: "`bid` = buy base; `ask` = sell base."
        order_type:
          type: string
          enum: [limit, ioc, fok]
        amount:
          type: integer
          format: uint64
          description: Order size in base units.
        price_limit:
          type: integer
          format: uint64
          description: |
            Worst acceptable price, in quote units per base. Required for
            a bid (must be > 0); an ask may use `0` to accept any clearing
            price.
        min_fill_size:
          type: integer
          format: uint64
          description: |
            Optional (default 0). Reject fills smaller than this; set equal
            to `amount` for resting all-or-none.
        expiry_slot:
          type: integer
          format: uint64
          description: |
            Solana slot past which this order auto-expires. Bounded by the
            per-market max expiry to prevent permanent collateral lock.
        order_id:
          type: string
          description: 16-byte client-chosen id, hex. Must be unique + non-zero.
        note_commitment:
          type: string
          description: |
            32-byte hex — Poseidon6 commitment to the collateral note this
            order is backed by. Note must exist on-chain (in the Merkle
            tree) AND be lockable (no existing NoteLock PDA).
        user_commitment:
          type: string
          description: |
            32-byte hex — binds the order's output notes to the correct
            owner on-chain. Top byte must be zero (BN254 Fr safety).
        arrival_nonce:
          type: integer
          format: uint64
          description: Per-order nonce bound into the signed canonical body.
        trading_key:
          type: string
          description: 32-byte hex — the Ed25519 public key that owns this order.
        trading_key_signature:
          type: string
          description: |
            64-byte hex — Ed25519 signature over `sha256(canonical body)`
            from the trading key. Lets the TEE attribute the order to a
            specific key without a per-order on-chain tx.
        owner_commitment:
          type: string
          description: |
            32-byte hex — the collateral note's owner commitment
            `Poseidon3(DOMAIN_OWNER=1, spending_key, r_owner)`. Part of the
            input-note opening the in-TEE VALID_MATCH_BATCH prover needs
            (the circuit re-derives `note_commitment` from the opening).
            Distinct from `user_commitment`. Verified against the signed
            `note_commitment` at intake. Held in enclave memory only.
        note_inner_hash:
          type: string
          description: |
            32-byte hex — the collateral note's amount-independent v2
            `inner_hash` (an opening field; replaces the v1 note_nonce +
            note_blinding pair). Anchors both the commitment and the
            nullifier.
        nullifier:
          type: string
          description: |
            32-byte hex — `Poseidon3(DOMAIN_NULL=3, spending_key,
            inner_hash)`, precomputed client-side (the spending key never
            enters the TEE). Opaque to the matcher; carried into the settle
            payload.
        merkle_root:
          type: string
          description: |
            32-byte hex — the merkle root the `valid_input_proof` was
            generated against. Relayed into `lock_note` (settle Tx A);
            must still be in the vault's root ring buffer at lock time.
        valid_input_proof:
          type: string
          description: |
            256-byte hex (`pi_a ‖ pi_b ‖ pi_c`) — the per-note VALID_INPUT
            Groth16 proof that gates `lock_note`. The TEE cannot generate
            it (needs the spending key + merkle witness), so the client
            supplies it; the matcher relays it unverified (on-chain
            `lock_note` verifies it).
        collateral_amount:
          type: integer
          format: uint64
          description: |
            Optional over-collateralization: the actual value the
            collateral note carries when it exceeds the order's nominal
            cost. Lets a large note back a small order; the surplus returns
            as a change note. Omit for exact collateral.
        anchors:
          type: array
          minItems: 10
          maxItems: 10
          description: |
            Exactly 10 continuation anchors. Each is the
            `(inner_hash, nullifier)` pair for a future change note, so the
            matcher can settle partial fills and re-lock the remainder
            without a per-fill round-trip. The SHA-256 over the pool is
            bound into the signed canonical body.
          items:
            type: object
            required: [inner_hash, nullifier]
            properties:
              inner_hash: { type: string, description: 32-byte hex (canonical BN254 Fr). }
              nullifier: { type: string, description: 32-byte hex. }

    Order:
      type: object
      description: The `GET /orders/{order_id}` status body.
      required:
        - order_id
        - side
        - order_type
        - status
        - amount
        - filled_quantity
        - price_limit
        - expiry_slot
        - arrival_slot
      properties:
        order_id:
          type: string
          description: 16-byte order id, hex (the one supplied at placement).
        side: { type: string, enum: [bid, ask] }
        order_type: { type: string, enum: [limit, ioc, fok] }
        status:
          type: string
          enum: [empty, pending, matched, expired, cancelled]
          description: |
            `pending` (resting), `matched` (settling/settled), `expired`,
            `cancelled`, or `empty` (slot reclaimed).
        amount:
          type: integer
          format: uint64
          description: Original order size, base units.
        filled_quantity:
          type: integer
          format: uint64
          description: Cumulative filled quantity.
        price_limit: { type: integer, format: uint64 }
        expiry_slot: { type: integer, format: uint64 }
        arrival_slot:
          type: integer
          format: uint64
          description: Slot stamped on arrival; frozen for the order's life.

    MassQuoteRequest:
      type: object
      required: [pairs]
      properties:
        pairs:
          type: array
          minItems: 1
          maxItems: 20
          description: |
            Atomic cancel-replace pairs. The TEE processes them as
            one batch — either all succeed or all fail. Designed
            for market-maker quote updates.
          items:
            type: object
            required: [cancel_order_id, place]
            properties:
              cancel_order_id:
                type: string
                description: |
                  Order to cancel. Use null to indicate a pure
                  "place new" with no replacement leg.
                nullable: true
              place:
                $ref: '#/components/schemas/PlaceOrderRequest'

    MassQuoteResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [cancel_status, place_order]
            properties:
              cancel_status:
                type: string
                enum: [cancelled, not_found, no_cancel_requested]
              place_order:
                $ref: '#/components/schemas/Order'

    Account:
      type: object
      description: |
        `GET /account` response. Returns ONLY the caller's open orders — the
        slice of account state the TEE legitimately holds (it tracks the
        order_id→account map at intake). Balances and notes are intentionally
        absent: linking an account to its notes needs the spending key, which
        the TEE never sees. Clients derive balances + spendable notes themselves
        from `/tree/*` + their own keys.
      required: [account_id, open_orders]
      properties:
        account_id: { type: string }
        open_orders:
          type: array
          description: The caller's orders still resting in the book.
          items: { $ref: '#/components/schemas/Order' }

    AccountSettings:
      type: object
      description: |
        Per-account preferences (`GET`/`PUT /account/settings`), persisted with
        the account. Omitted fields default on `PUT`.
      properties:
        cancel_on_disconnect_default:
          type: boolean
          description: |
            Account-wide default for `/ws/trading` cancel-on-disconnect. A
            socket's explicit `?cancel_on_disconnect=` query param overrides it.
          default: false

    TreeRoot:
      type: object
      required: [merkle_root, leaf_count, on_chain_slot]
      properties:
        tree_id:
          type: integer
          default: 0
          description: |
            Which Merkle shard this root is for (echoes the request's
            `?tree_id`, default 0). Present under tree-sharding.
        merkle_root:
          type: string
          description: |
            Current Merkle root of shard `tree_id`, hex-encoded. Must
            equal on-chain `MerkleTree[tree_id].current_root` (or be
            present in that shard's 32-root ring buffer).
        leaf_count:
          type: integer
          description: Leaf count of this shard.
        on_chain_slot:
          type: integer
          description: |
            Solana slot at which the TEE last synced this shard's mirror
            from on-chain `MerkleTree[tree_id]`.

    InclusionProof:
      type: object
      required: [note_commitment, leaf_index, merkle_root, siblings]
      properties:
        note_commitment: { type: string }
        leaf_index: { type: integer }
        merkle_root: { type: string }
        siblings:
          type: array
          minItems: 20
          maxItems: 20
          items:
            type: string
            description: 32-byte hex.

    TransparencySnapshot:
      type: object
      required: [reserves, tee, stats]
      description: |
        Public, unauthenticated. Anyone can verify
        (a) vault token balances cover liabilities + (b) the TEE
        attestation is current + (c) aggregate operations are
        healthy.
      properties:
        reserves:
          type: object
          required: [merkle_root, leaf_count, per_mint]
          properties:
            merkle_root:
              type: string
              description: |
                Shard-0 root for back-compat. Under tree-sharding each
                shard has its own root; read per-shard via
                `/tree/root?tree_id=`.
            leaf_count:
              type: integer
              description: Total leaves SUMMED across all `num_trees` shards.
            per_mint:
              type: array
              items:
                type: object
                required: [mint, outstanding, vault_balance, stale]
                properties:
                  mint: { type: string }
                  outstanding:
                    type: string
                    description: |
                      Sum of un-spent note amounts for this mint
                      (== `OutstandingMint.outstanding`).
                  vault_balance:
                    type: string
                    description: |
                      Actual SPL balance in the vault's PDA for
                      this mint. MUST be >= outstanding (the v2
                      solvency invariant). If not, something is
                      wrong on-chain.
                  stale:
                    type: boolean
                    description: |
                      true if either on-chain read was DEGRADED (RPC
                      error or malformed account); outstanding /
                      vault_balance are then "unknown", not a real 0 —
                      ignore the numbers for a solvency check.
        tee:
          type: object
          description: |
            Engine attestation IDENTITY — enough to tie this response to
            a measured image. The full challenge-response quote is at
            GET /attestation.
          required: [app_id, compose_hash, mrtd, signer_pubkey]
          properties:
            app_id: { type: string }
            compose_hash: { type: string }
            mrtd: { type: string }
            signer_pubkey: { type: string, description: TEE Ed25519 signer (base58). }
        stats:
          type: object
          description: |
            Settle-scheduler counters tracked today. The 24h windows +
            finality timing (avg_settlement_finality_ms, settles_24h, …)
            are a later addition once the scheduler records timestamps.
          required: [batches, jobs]
          properties:
            batches: { type: integer, description: Settle batches tracked. }
            jobs: { type: integer, description: Per-match settle jobs tracked. }

    SettlementStatus:
      type: object
      required: [batch_id, status, merkle_root]
      properties:
        batch_id: { type: string }
        status:
          type: string
          enum:
            - pending_proof
            - pending_verify_match_batch
            - pending_settles
            - pending_close
            - settled
            - failed
        merkle_root: { type: string }
        verify_match_batch_signature:
          type: string
          nullable: true
          description: L1 tx signature for the batch's verify tx.
        settle_signatures:
          type: array
          description: |
            Per-match settle tx signatures, in match-index order.
          items: { type: string }
        close_signature:
          type: string
          nullable: true
        settled_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
          description: |
            Present iff status == failed. Human-readable failure
            reason + correlation id for ops debugging.

# ─────────────────────────────────────────────────────────────────────────────
# REST endpoints
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ───── auth ────────────────────────────────────────────────────────────────

  /auth/token:
    post:
      tags: [auth]
      summary: Exchange long-lived credentials for a short-lived bearer token.
      description: |
        OAuth2 client_credentials grant. Issue rate is rate-limited
        per api_key.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthTokenRequest' }
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenResponse' }
        '401':
          description: Bad credentials.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limited.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/token/revoke:
    post:
      tags: [auth]
      summary: Revoke an issued bearer token.
      description: |
        Adds the calling token's `jti` to the TEE's revocation
        denylist; subsequent requests presenting the same token are
        rejected with 401. The denylist is in-memory (Phase 1a) — a
        revoked token can outlive a TEE restart by at most its
        remaining `exp` TTL.
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Revoked. }
        '401':
          description: Token already invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── admin ─────────────────────────────────────────────────────────────────

  /admin/accounts:
    post:
      tags: [admin]
      summary: Register a new API account (admin only).
      description: |
        Admin-gated account provisioning. The caller's bearer token
        must belong to an account with `is_admin = true` (re-checked
        against the live registry, not trusted from the token claim,
        so an admin demotion takes effect immediately). The supplied
        `(api_secret, passphrase)` are argon2id-hashed before storage;
        plaintext is never persisted. The bootstrap admin is seeded
        from the `NYX_TEE_API_*` env at TEE boot.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterAccountRequest' }
      responses:
        '201':
          description: Account registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegisterAccountResponse' }
        '400':
          description: Missing / empty api_key, api_secret, or passphrase.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Missing / invalid / revoked bearer token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Caller is authenticated but not an admin.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: An account with this api_key already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── attestation ─────────────────────────────────────────────────────────

  /attestation:
    get:
      tags: [attestation]
      summary: Fresh TEE attestation quote (challenge-response).
      description: |
        Unauthenticated. Clients MUST verify this quote before
        sending order intent. Full verification chain documented
        in docs/tee-attestation-flow.md §4.

        The caller supplies a fresh nonce via reportData; the TEE
        generates a quote with reportData populated as:
            report_data[0..32]  = caller's nonce
            report_data[32..64] = SHA-256(tee_pubkey)

        Verification steps (handled by the SDK's
        verifyTeeAttestation() helper):
          1. Verify Intel TCB cert chain (locally via dcap-qvl or
             via Phala's POST /api/v1/attestations/verify).
          2. Replay RTMR3 event log → confirm rt_mr3 in quote.
          3. Confirm compose-hash event in RTMR3 == the SDK's
             baked-in EXPECTED_COMPOSE_HASH constant.
          4. Confirm key-provider event == known-trusted KMS ID.
          5. Confirm reportData starts with the supplied nonce
             (replay protection) AND ends with SHA-256(tee_pubkey).
          6. Optionally: check CAA records + CT logs (paranoid).
      parameters:
        - name: reportData
          in: query
          required: false
          schema: { type: string }
          description: |
            32-byte nonce in hex. If omitted, the TEE generates a
            quote with all-zero reportData[0..32]. Always supply a
            fresh nonce for live verification (replay protection).
      responses:
        '200':
          description: Current quote.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttestationQuote' }

  /info:
    get:
      tags: [info]
      summary: Application + instance metadata.
      description: |
        Returns the running image's compose-hash, app-id, instance-id,
        device-id, OS image hash, and the Ed25519 signer pubkey. Used
        by the SDK to compare compose-hash against the baked-in
        EXPECTED_COMPOSE_HASH constant and by ops dashboards to track
        which CVM is serving which traffic.
      responses:
        '200':
          description: Application info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInfo' }

  /evidences/quote.json:
    get:
      tags: [attestation]
      summary: TDX quote bundle (served by dstack-ingress, not nyx-tee)
      description: |
        Static evidence file. Part of the RA-TLS verification chain;
        see docs/tee-attestation-flow.md §4.1. SHA-256 of this file
        appears in the quote's reportData, proving the TEE generated
        both the quote and the cert at the same time.
      responses:
        '200':
          description: Quote JSON bundle (raw).
          content:
            application/json: {}

  /evidences/cert.pem:
    get:
      tags: [attestation]
      summary: Current TLS certificate (served by dstack-ingress)
      responses:
        '200':
          description: PEM-encoded cert.
          content:
            application/x-pem-file: {}

  /evidences/acme-account.json:
    get:
      tags: [attestation]
      summary: Let's Encrypt account URI (served by dstack-ingress)
      description: |
        Used together with CAA DNS records to prove that ONLY this
        TEE's ACME account can issue certs for this domain.
      responses:
        '200':
          description: ACME account JSON.
          content:
            application/json: {}

  /evidences/sha256sum.txt:
    get:
      tags: [attestation]
      summary: Hash of cert.pem + acme-account.json (served by dstack-ingress)
      description: |
        Allows clients to verify the evidence bundle wasn't tampered
        with. The quote's reportData contains sha256(this file).
      responses:
        '200':
          description: Plain-text hash.
          content:
            text/plain: {}

  # ───── instruments ─────────────────────────────────────────────────────────

  /instruments:
    get:
      tags: [instruments]
      summary: List all tradable instruments.
      responses:
        '200':
          description: All markets.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Instrument' }

  /instruments/{symbol}:
    get:
      tags: [instruments]
      summary: Single instrument detail.
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Instrument detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Instrument' }
        '404':
          description: Unknown symbol.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── orders ──────────────────────────────────────────────────────────────

  /orders:
    post:
      tags: [orders]
      summary: Place a new order.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaceOrderRequest' }
      responses:
        '201':
          description: Order accepted into the matching queue.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400':
          description: Validation error (bad signature, mint mismatch, etc.).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            Conflict — the referenced note_commitment is already
            locked by another order or has been spent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{order_id}:
    get:
      tags: [orders]
      summary: Order status + fill history.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Order detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Unknown order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [orders]
      summary: Cancel an open order.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cancellation processed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Order doesn't exist or is already terminal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      tags: [orders]
      summary: |
        Modify an open order — atomic cancel + replace.
      description: |
        "The same owner replaces their resting order with a new one." The body
        carries a signed cancel of the OLD order (over its id) plus a full new
        order (`replacement`, a normal signed order). The trading key that signs
        the cancel MUST be the one that signs the replacement. The swap is
        applied under one matcher lock with BOTH preconditions checked first
        (old order exists + owned; replacement order_id not already booked unless
        it is the same id, a reprice in place), so there is no window where the
        caller has neither order. The replacement carries its own note +
        VALID_INPUT proof (it may reuse the old note while the root is still in
        the 64-root window) — no new signed message type; it composes the
        existing cancel + order canonical bodies.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
          description: The OLD order's id (hex) to replace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancel_signature, cancel_nonce, replacement]
              properties:
                cancel_signature:
                  type: string
                  description: 64-byte Ed25519 sig over CancelCanonical{old_id, trading_key, cancel_nonce}, hex.
                cancel_nonce: { type: integer }
                replacement:
                  description: A full, independently-signed place-order body (same shape as POST /orders).
      responses:
        '200':
          description: Modified — old order cancelled, replacement resting.
          content:
            application/json:
              schema:
                type: object
                required: [old_order_id, order_id, status, arrival_slot]
                properties:
                  old_order_id: { type: string }
                  order_id: { type: string, description: New order id (may equal old_order_id on a reprice). }
                  status: { type: string, enum: [modified] }
                  arrival_slot: { type: integer }
        '403':
          description: The booked order is not owned by this trading_key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: The old order doesn't exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: The replacement order_id is already booked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/mass-quote:
    post:
      tags: [orders]
      summary: |
        Atomic cancel-replace batch (SHELVED — not implemented).
      description: |
        **Shelved, not built.** A true mass-quote needs a collateral
        primitive we don't have: one note backing a *set* of quotes
        (today every resting order pins its own locked note + VALID_INPUT
        proof, so N quotes cost N notes — there is no cheaper-than-N path
        at the endpoint layer). That primitive is a vault + circuit
        project, not an endpoint. The MM-friendly atomic operation we DO
        ship is `PUT /orders/{order_id}` (single atomic cancel+replace).
        Rationale + the revisit criteria: docs/api-surface-roadmap.md
        (Shelved → Mass-quote). Returns 501 until/unless built.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MassQuoteRequest' }
      responses:
        '501':
          description: Shelved — use PUT /orders/{order_id} for atomic cancel+replace.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ───── account ─────────────────────────────────────────────────────────────

  /account:
    get:
      tags: [account]
      summary: The caller's open orders.
      description: |
        Returns the orders this account placed that are still in the book.
        Balances + notes are intentionally NOT returned — the TEE has no
        spending key, so clients derive those themselves from `/tree/*` + their
        own keys (docs/tee-architecture.md §11.3).
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Open-orders snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }

  /account/settings:
    get:
      tags: [account]
      summary: Read the caller's account settings.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Current settings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountSettings' }
    put:
      tags: [account]
      summary: Replace the caller's account settings.
      description: |
        Replaces the settings wholesale (omitted fields default), then persists.
        Used e.g. to set the cancel-on-disconnect default for all future
        `/ws/trading` sockets.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountSettings' }
      responses:
        '200':
          description: The updated settings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountSettings' }

  # ───── tree ────────────────────────────────────────────────────────────────

  /tree/root:
    get:
      tags: [tree]
      summary: |
        Current Merkle root + leaf count.
      description: |
        Convenience read served by the TEE's in-memory Merkle mirror.
        Eventually-consistent with the on-chain
        MerkleTree[tree_id].current_root (lags by ~1-2 slots after each
        settle confirms).

        Under tree-sharding the on-chain tree is split into `num_trees`
        per-shard `MerkleTree` accounts; pass `?tree_id` to select a
        shard (default 0). The response echoes the `tree_id` it served.

        Trustless fallback: clients who don't trust the TEE for read
        queries can fetch MerkleTree[tree_id] directly from Solana RPC
        and recompute / verify on their own. /tree/root is a fast happy
        path, not a trust layer. See docs/tee-architecture.md §5.5
        and docs/tee-attestation-flow.md §10.
      parameters:
        - name: tree_id
          in: query
          required: false
          schema: { type: integer, default: 0 }
          description: Which Merkle shard to read (0..num_trees-1). Default 0.
      responses:
        '200':
          description: Tree root snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreeRoot' }

  /tree/inclusion:
    get:
      tags: [tree]
      summary: |
        Inclusion proof for a specific note commitment.
      description: |
        Replacement for `MerkleShadow.witness()`. Clients build
        VALID_SPEND / VALID_INPUT proofs against the returned
        siblings.

        The TEE-served inclusion proof is verifiable: re-hash the
        leaf + siblings up to the returned merkle_root, compare
        against the on-chain MerkleTree[tree_id].current_root, accept
        the proof only if both match. The TEE cannot lie about an
        inclusion proof without the client detecting it on Solana — so
        this is a fast convenience read, not a trust assertion.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: commitment
          in: query
          required: true
          schema: { type: string }
          description: 32-byte hex note commitment.
        - name: tree_id
          in: query
          required: false
          schema: { type: integer, default: 0 }
          description: Which Merkle shard the commitment lives in. Default 0.
      responses:
        '200':
          description: Inclusion proof.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InclusionProof' }
        '404':
          description: Commitment not in the tree.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /tree/leaves:
    get:
      tags: [tree]
      summary: |
        Page through leaves. Used by clients catching up cold or
        re-syncing after a long disconnect.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: integer }
        - name: to
          in: query
          required: true
          schema: { type: integer }
        - name: tree_id
          in: query
          required: false
          schema: { type: integer, default: 0 }
          description: Which Merkle shard to page (0..num_trees-1). Default 0.
      responses:
        '200':
          description: Leaves in [from, to) on the selected shard.
          content:
            application/json:
              schema:
                type: object
                required: [leaves, merkle_root]
                properties:
                  leaves:
                    type: array
                    items:
                      type: object
                      required: [leaf_index, value]
                      properties:
                        leaf_index: { type: integer }
                        value: { type: string }
                  merkle_root: { type: string }

  # ───── system ──────────────────────────────────────────────────────────────

  /system/status:
    get:
      tags: [system]
      summary: |
        Liveness / degraded-mode snapshot. Public, unauthenticated.
      description: |
        Reports whether the matching tick and the on-chain settle
        pipeline are wired, whether an oracle cache is attached, and the
        TEE's current Solana slot. `degraded` is `true` whenever the
        matcher or the settle pipeline is down — mirrors GoDark's
        degraded-mode signaling so clients can back off before they hit
        a write failure.
      responses:
        '200':
          description: Engine status snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [degraded, matcher_running, settle_enabled, oracle_configured, current_slot, nyx_version]
                properties:
                  degraded:
                    type: boolean
                    description: true when matching OR settle is down.
                  matcher_running: { type: boolean }
                  settle_enabled:
                    type: boolean
                    description: The on-chain settle pipeline is wired.
                  oracle_configured:
                    type: boolean
                    description: An oracle cache (clearing-price reference) is attached.
                  current_slot: { type: integer, format: uint64 }
                  nyx_version: { type: string }

  /time:
    get:
      tags: [system]
      summary: |
        Server time — current Solana slot + unix ms. Public.
      description: |
        The TEE's current slot and wall-clock time. Clients use this to
        convert a wall-clock GTT (good-till-time) expiry into an
        `expiry_slot` without running their own RPC. Mirrors GoDark's
        "Server Time".
      responses:
        '200':
          description: Server time snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [slot, unix_ms]
                properties:
                  slot: { type: integer, format: uint64 }
                  unix_ms: { type: integer, format: uint64, description: Server unix time, milliseconds. }

  # ───── transparency ────────────────────────────────────────────────────────

  /transparency:
    get:
      tags: [transparency]
      summary: |
        Public proof-of-reserves + engine attestation + aggregate
        stats. Unauthenticated. Anyone can verify.
      parameters:
        - name: epoch
          in: query
          schema: { type: integer }
          description: |
            Optional. Returns the snapshot for a specific TEE
            epoch (rotation generation). Default is current.
      responses:
        '200':
          description: Transparency snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransparencySnapshot' }

  # ───── settlement ──────────────────────────────────────────────────────────

  /settlement/status/{batch_id}:
    get:
      tags: [settlement]
      summary: |
        Batch settlement status. Translates a TEE-internal batch
        ID to the on-chain tx signatures of the
        verify_match_batch + tee_forced_settle_batched +
        close_batch_validity_marker chain.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: batch_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Settlement status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettlementStatus' }
        '404':
          description: Unknown batch ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

# ─────────────────────────────────────────────────────────────────────────────
# WebSocket (described inline because OpenAPI 3.1 has no first-class
# WS surface — AsyncAPI would be cleaner; here we document the wire
# protocol as a series of message schemas)
# ─────────────────────────────────────────────────────────────────────────────

x-websocket-implemented:
  # The CURRENTLY IMPLEMENTED WS surface (the multiplexed `/v1/stream` below is
  # the planned superset). Two dedicated, per-account streams: fill-memos and
  # order-lifecycle events. Both share the same self-auth + per-account routing.
  auth: |
    Bearer token from POST /auth/token, passed as the `?token=` query param
    (browsers + the global WebSocket can't set an Authorization header on the
    upgrade; a `Authorization: Bearer` header is also accepted). Every stream is
    PER-ACCOUNT: a subscriber only ever receives events for orders it placed
    (routed via the intake-time order_id→account map).

    SEQUENCING: every server message carries a top-level `seq` — a per-connection
    monotonic counter starting at 1. A gap in `seq` (or a 1011 lag-close) means
    the client missed messages; recover by reconciling (GET /orders/:id for the
    orders stream; the indexer backfill for fills).
  streams:
    /ws/fills:
      description: |
        Per-account continuation-fill memos. Earlier fills (before the socket
        opened, or after a lag-close) are recovered from the off-TEE indexer —
        the "backfill then tail" client flow.
      server_messages:
        FillMemo:
          description: One continuation fill. The client verifies it (inner_hash +
            commitment binding) then stores the change note. See docs/fills-history-architecture.md.
          message:
            type: object
            required: [seq, order_id, anchor_index, change_amount, change_note_commitment, mint, inner_hash]
            properties:
              seq: { type: integer, format: uint64, description: Per-connection monotonic sequence (gap detection). }
              order_id: { type: string, description: 16-byte hex. }
              anchor_index: { type: integer }
              change_amount: { type: integer, format: uint64 }
              change_note_commitment: { type: string, description: 32-byte hex. }
              mint: { type: string, description: 32-byte hex. }
              inner_hash: { type: string, description: 32-byte hex. }
    /ws/orders:
      description: |
        Per-account order-lifecycle events. The matcher emits an update each
        time one of the account's orders changes state in a tick
        (partial/full fill, expiry); an explicit DELETE /orders/{id} (and the
        cancel leg of a PUT /orders/{id} modify) also emits a synthetic
        `cancelled`. Terminal events (fully_filled / cancelled / expired) are the
        order's last; the server then drops its routing entry.
      server_messages:
        OrderUpdate:
          description: One order state transition. `filled_quantity` is present on fills;
            `new_amount` / `new_note_amount` are present on a partial fill (the residual
            that keeps resting).
          message:
            type: object
            required: [seq, order_id, kind]
            properties:
              seq: { type: integer, format: uint64, description: Per-connection monotonic sequence (gap detection). }
              order_id: { type: string, description: 16-byte hex. }
              kind:
                type: string
                enum: [partially_filled, fully_filled, cancelled, expired]
              filled_quantity: { type: integer, format: uint64 }
              new_amount: { type: integer, format: uint64, description: Residual base amount after a partial fill. }
              new_note_amount: { type: integer, format: uint64, description: Residual collateral-note amount after a partial fill. }
    /ws/trading:
      description: |
        BIDIRECTIONAL order-submission socket. One warm, pre-authenticated
        connection over which a client streams framed `order.place` /
        `order.cancel` / `order.modify` requests and gets one reply per frame —
        each dispatched to the SAME intake the REST `POST/DELETE/PUT /orders`
        handlers use, so there is no second verification path. The win over
        REST is the avoided per-request TLS + bearer round-trip and
        **cancel-on-disconnect**.

        AUTH: the socket self-authenticates at upgrade (bearer via `?token=` or
        the Authorization header). The per-order trading-key SIGNATURE is still
        required on every place/cancel/modify frame (the JWT identifies the
        account; the trading_key is the cryptographic owner) — an authed socket
        cannot move another key's orders.

        CANCEL-ON-DISCONNECT: open with `?cancel_on_disconnect=true`. The TEE
        tracks the orders placed on THIS socket and, when it closes, cancels
        the ones still resting. That teardown is server-initiated (no client
        signature — the order was placed on this authenticated session, and a
        cancel only removes a resting order, never settles). A market maker
        that loses connectivity therefore doesn't leave stale quotes crossing.
      client_messages:
        # Each frame is internally tagged by `op`; `request_id` (optional) is
        # echoed on the reply so a client can correlate on the multiplexed socket.
        order.place:
          message:
            type: object
            required: [op, params]
            properties:
              op: { type: string, enum: [order.place] }
              request_id: { type: string }
              params: { $ref: '#/components/schemas/PlaceOrderRequest' }
        order.cancel:
          message:
            type: object
            required: [op, order_id, params]
            properties:
              op: { type: string, enum: [order.cancel] }
              request_id: { type: string }
              order_id: { type: string, description: 16-byte hex. }
              params:
                type: object
                description: Same body as DELETE /orders/{id} (trading-key cancel signature).
                required: [trading_key, cancel_nonce, trading_key_signature]
                properties:
                  trading_key: { type: string }
                  cancel_nonce: { type: integer }
                  trading_key_signature: { type: string }
        order.modify:
          message:
            type: object
            required: [op, order_id, params]
            properties:
              op: { type: string, enum: [order.modify] }
              request_id: { type: string }
              order_id: { type: string, description: The OLD order id (hex) to replace. }
              params:
                type: object
                required: [cancel_signature, cancel_nonce, replacement]
                properties:
                  cancel_signature: { type: string }
                  cancel_nonce: { type: integer }
                  replacement: { $ref: '#/components/schemas/PlaceOrderRequest' }
        ping:
          message:
            type: object
            required: [op]
            properties:
              op: { type: string, enum: [ping] }
              request_id: { type: string }
      server_messages:
        Reply:
          description: |
            One reply per request frame. `op` echoes the request's
            (`order.place` / `order.cancel` / `order.modify`) with a `result`
            body identical to the REST response, or `pong` for a ping. A failed
            frame returns `op: error` with the same numeric `code` + `message`
            the REST error envelope would have returned (see the Error Codes
            reference).
          message:
            type: object
            required: [op, seq]
            properties:
              op: { type: string, enum: [order.place, order.cancel, order.modify, pong, error] }
              seq: { type: integer, format: uint64, description: Per-connection monotonic sequence (every reply frame). }
              request_id: { type: string }
              result: { type: object, description: Present on success; mirrors the REST response body. }
              code: { type: integer, description: "Present on `error` — the stable numeric error code." }
              message: { type: string, description: Present on `error`. }
  close_codes:
    1011: Lagged past the per-account buffer — reopen and backfill from the indexer.

x-websocket:

  url: /v1/stream
  description: |
    PLANNED multiplexed superset (the live surface is the dedicated
    `/ws/fills`, `/ws/orders`, and `/ws/trading` sockets above — the
    order.place/cancel/modify ops below already ship on `/ws/trading`).
    One multiplexed socket per session. Authenticate with
    `op: login` (carrying a bearer token from POST /auth/token),
    then subscribe to channels.

    There is no in-band session-encryption envelope. The previous
    draft of this spec had X25519 ECDH + AES-256-GCM ops
    (session.setup / rekey) as defense against a malicious load
    balancer. dstack-ingress + RA-HTTPS supersedes that:
    TLS terminates INSIDE the enclave (cert private key generated
    by the TEE; never leaves it), so there is no LB in the trust
    path. Verification done client-side via /evidences/ and
    /attestation — see docs/tee-attestation-flow.md §4.

    Heartbeat: client sends `op: ping` every ≤30s; server
    responds with `op: pong`. Server drops sessions silent for >60s.

  client_ops:

    login:
      description: |
        Authenticate the socket using a bearer token. Required
        before any other op (except ping). Server emits
        `auth_expired` ~60s before token expiry as a reminder.
      message:
        type: object
        required: [op, token]
        properties:
          op: { type: string, enum: [login] }
          token: { type: string, description: Bearer token from POST /auth/token. }
          cancel_on_disconnect:
            type: boolean
            description: |
              If true, the TEE auto-cancels all open orders for
              this account when this socket disconnects.
              Recommended for market makers.

    logout:
      description: End the session cleanly. Server closes the socket.
      message:
        type: object
        required: [op]
        properties:
          op: { type: string, enum: [logout] }

    ping:
      description: Heartbeat (client → server).
      message:
        type: object
        required: [op]
        properties:
          op: { type: string, enum: [ping] }

    # session.setup and rekey ops were removed in the 2026-05-25
    # revision after we adopted dstack-ingress + RA-HTTPS. Session
    # encryption is now exclusively TLS-into-the-enclave; no
    # additional X25519 envelope is needed. Clients that want the
    # belt-and-braces guarantee should verify the /evidences/
    # bundle once at connect, then trust the TLS channel for the
    # session lifetime.

    subscribe:
      description: Subscribe to one or more channels.
      message:
        type: object
        required: [op, channels]
        properties:
          op: { type: string, enum: [subscribe] }
          channels:
            type: array
            items:
              type: string
              enum: [orders, fills, account, settlement, tree]

    unsubscribe:
      description: Unsubscribe from channels.
      message:
        type: object
        required: [op, channels]
        properties:
          op: { type: string, enum: [unsubscribe] }
          channels:
            type: array
            items: { type: string }

    order.place:
      description: |
        Place an order over WS (same shape as POST /orders, just
        encapsulated in the multiplexed socket). Server responds
        with the resulting Order; subsequent state changes arrive
        on the `orders` channel.
      message:
        type: object
        required: [op, request_id, params]
        properties:
          op: { type: string, enum: [order.place] }
          request_id: { type: string, description: Echoed in the response. }
          params: { $ref: '#/components/schemas/PlaceOrderRequest' }

    order.cancel:
      description: Cancel an open order.
      message:
        type: object
        required: [op, request_id, order_id]
        properties:
          op: { type: string, enum: [order.cancel] }
          request_id: { type: string }
          order_id: { type: string }

    order.modify:
      description: |
        Atomic cancel + replace (same as PUT /orders/{order_id}): cancel the
        OLD order and rest a fully-signed replacement under one matcher lock.
      message:
        type: object
        required: [op, request_id, order_id, cancel_signature, cancel_nonce, replacement]
        properties:
          op: { type: string, enum: [order.modify] }
          request_id: { type: string }
          order_id: { type: string, description: The OLD order id (hex) to replace. }
          cancel_signature: { type: string }
          cancel_nonce: { type: integer }
          replacement: { $ref: '#/components/schemas/PlaceOrderRequest' }

    # order.mass_quote was SHELVED (see POST /orders/mass-quote and
    # docs/api-surface-roadmap.md): a mass-quote needs a one-note-backs-many-
    # quotes collateral primitive we don't have. The atomic MM op we ship is
    # order.modify (single cancel+replace) above.

    account.info:
      description: |
        DEFERRED — mirrors GET /account, which returns 501 by design:
        the TEE never sees a spending key, so it cannot compute
        per-account balances / spendable notes. Clients reconstruct
        account state CLIENT-SIDE from the `/tree/*` endpoints (or the
        `tree` channel) plus their own keys. Implementations should
        reply with the same not-implemented error as GET /account
        rather than a snapshot. See docs/tee-architecture.md §11.3.
      message:
        type: object
        required: [op, request_id]
        properties:
          op: { type: string, enum: [account.info] }
          request_id: { type: string }

    tree.inclusion:
      description: |
        Pull-style inclusion proof over WS (lower latency than
        REST round-trip when building VALID_SPEND proofs in a
        tight loop).
      message:
        type: object
        required: [op, request_id, commitment]
        properties:
          op: { type: string, enum: [tree.inclusion] }
          request_id: { type: string }
          commitment: { type: string }

  server_channels:

    orders:
      description: |
        User's own order state. Server sends snapshot on
        subscribe, then incremental updates (`event: placed` /
        `partial` / `filled` / `cancelled` / `expired`).

    fills:
      description: Per-fill events as matches happen.

    account:
      description: |
        DEFERRED — same reason as GET /account (501): the TEE can't
        derive per-account balances / spendable notes without a
        spending key it never holds. Clients keep account state by
        reconstructing it from the `tree` channel (leaf-append events)
        + their own keys; this channel is not served. See
        docs/tee-architecture.md §11.3.

    settlement:
      description: |
        Batch finalization events. Each event has the batch_id
        + the on-chain tx signatures, mirroring
        GET /settlement/status/{batch_id}.

    tree:
      description: |
        Leaf-append events (for clients that want to keep an
        incremental view of the tree, e.g. dapps showing live
        portfolio state).

# ─────────────────────────────────────────────────────────────────────────────
# Notes for implementers
# ─────────────────────────────────────────────────────────────────────────────

x-implementation-notes:

  auth_lifecycle: |
    `api_key` / `api_secret` / `passphrase` are provisioned at
    account creation and stored client-side (encrypted at rest).
    Tokens issued by POST /auth/token are short-lived (≤ 1h) and
    cached in-process. The WS auto-renewal pattern: server emits
    `auth_expired` ~60s before token expiry; client sends a
    fresh `op: login` with a new token on the same socket
    without dropping subscriptions.

  session_encryption: |
    NONE in band. TLS terminates inside the dstack-ingress
    container running inside our CVM, with a cert whose private
    key was generated by dstack-kms-issued seed and never exposed
    outside the enclave. Clients verify this by fetching the
    /evidences/ bundle once at connect and following the chain
    documented in docs/tee-attestation-flow.md §4.

    The earlier draft of this spec had an X25519 ECDH +
    AES-256-GCM session envelope inside TLS, intended to defend
    against a malicious load balancer. dstack-ingress + RA-HTTPS
    makes that envelope unnecessary — there is no LB in the trust
    path. The session.setup / rekey WS ops were deleted in the
    2026-05-25 revision.

    Edge case: if a future deployment ever moves from
    dstack-ingress (custom domain, TLS-in-enclave) to a gateway
    domain with TLS termination at dstack-gateway, the X25519
    envelope would need to come back. Re-introduce session.setup
    / rekey ops at that point. Until then, omitted.

  validation_at_the_tee: |
    Every authenticated write goes through:
      1. Bearer-token validation.
      2. AEAD envelope decryption (if session.setup was done).
      3. Trading-key signature verification on the inner payload.
      4. Business-rule validation (note exists, not locked,
         mint matches, expiry sensible, amount > 0, etc.).
    Only after all four does the order land in the in-memory
    book.

  settlement_correlation: |
    Each TEE batch is identified by a stable `batch_id`. Orders
    that match in that batch reference it via `Order.batch_id`.
    Clients can correlate "this fill" → "this batch" → "this
    on-chain tx_signature" via /settlement/status. The
    `channel: settlement` WS event fires once per batch as the
    on-chain settle chain (verify → settles → close) finalizes.

  tree_consistency: |
    `/tree/root?tree_id=` returns the TEE's current view of that
    shard, eventually consistent with the on-chain
    `MerkleTree[tree_id].current_root` (lags by ~1-2 slots after each
    settle confirms). For correctness-critical reads (e.g. just before
    building a VALID_SPEND proof), clients should call /tree/root for
    the shard the note lives in, take the root value, build the proof
    against THAT specific root, and submit `withdraw` referencing the
    same root + tree_id. The on-chain handler accepts any root within
    that shard's 32-slot ring buffer.

  rate_limits: |
    Per-account weighted action cost model — order placement
    counts more than `GET /account`. Specific limits TBD; safe
    defaults to start: 60 orders/min, 600 reads/min, 5
    mass-quote-batches/min. Limits are enforced at the gateway
    AND at the TEE (defence in depth).

  errors: |
    All errors return { code, message, retry_after_ms? } in the
    Error schema. Codes are stable strings (not numbers) for easy
    client handling.

    Server-side codes (HTTP/WS responses):
      `token_expired`               — bearer token expired
      `bad_credentials`             — POST /auth/token failed
      `note_already_locked`         — note has an active NoteLock
      `commitment_not_in_tree`      — note not in current Merkle root
      `mint_mismatch`               — order mint doesn't match note
      `min_fill_violation`          — fill below order's min_fill_size
      `circuit_breaker_hit`         — clearing price exceeded oracle band
      `rate_limited`                — per-account rate limit exceeded

    Client-side (SDK-thrown, never sent over the wire):
      `TEE_ATTESTATION_FAILED`      — generic; see specific code below
      `TEE_QUOTE_SIG_INVALID`       — Intel TCB cert chain failed
      `TEE_COMPOSE_HASH_MISMATCH`   — rt_mr3 compose-hash != expected
      `TEE_REPORT_DATA_MISMATCH`    — quote not bound to served cert
      `TEE_EVIDENCE_TAMPERED`       — sha256sum mismatch in /evidences/
      `TEE_KEY_PROVIDER_UNKNOWN`    — key-provider event != trusted KMS